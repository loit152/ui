<!DOCTYPE html>
<html>
  <head>
    <title>ミステリーボックス</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <style>
      * {
        margin: 0;
        padding: 0;
      }
      div {
        box-sizing:border-box;
        font-size:30px;
        background-color: white;
      }

      .container {
        border:2px solid #333333;
        margin-right: auto;
        margin-left:  auto;
        max-width: 960px;
        height:auto;
        background-color: gray;
      }

      .header{
        width:100%;
        height:100px;
        padding: 20px;
        background-color: green;
        font-size:35px;
        color:white;
        text-align:center;
      }

      .footer{
        width:100%;
        height:50px;
        padding-top: 10px;
        background-color: #006600;
        color:white;
        font-size:18px;
        text-align:right;
      }

      .main{
        width:100%;
        padding:30px;
        border-bottom: 1px solid #333333;
        background:white;
      }

      .hint {
        margin: 12px 0;
        font-size: 20px;
      }
      .choice {
        margin: 10px;
        padding: 10px 20px;
        font-size: 18px;
      }
      #nextHint, #nextQuestion {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
      }
      #nextHint {
        margin-bottom:40px;
      }
    </style>
  </head>

<body>
  <div class="container">

    <div class="header">
      🎁 ミステリーボックス 🎁
    </div>

    <div class="main">

      <p id="score">ポイント：0</p>

      <div id="hints"></div>
      <button id="nextHint">次のヒント</button>

      <div id="choices"></div>
      <p id="result"></p>

      <button id="nextQuestion" style="display:none;">次の問題</button>

    </div>

    <div class="footer">
		5石井19下平21須藤23清田
    </div>
  </div>

<script>
//問題データ　question.hint[n]みたいな感じで表現できる　二次元配列 連想配列  
const questions = [
    {
      hints: [
        "ヒント1：プロの野球選手です",
        "ヒント2：日本人です",
        "ヒント3：二刀流で有名です"
      ],
      choices: ["メッシ", "大谷翔平", "イチロー"],
      answer: "大谷翔平",
      image: "img/IMG_box.jpeg",
      correctImage:"img/IMG_sho.jpeg"
    },
    {
      hints: [
        "ヒント1：歴史上の人物です",
        "ヒント2：天下統一したことがあります",
        "ヒント3：羽柴秀吉とも呼ばれます"
      ],
      choices: ["豊臣秀吉", "織田信長", "明智光秀"],
      answer: "豊臣秀吉",
      image: "img/IMG_box.jpeg",
      correctImage:"img/IMG_toyo.jpeg"
    },
    {
      hints: [
        "世界的に有名なキャラクターです",
        "黄色い身体をしています",
        "電気を使った攻撃をします"
        ],
        choices: ["ドラえもん","スヌーピー","ピカチュウ"],
        answer:"ピカチュウ",
        image:"img/IMG_box.jpeg",
        correctImage:"img/IMG_pika.webp"
        
    },
    {
  hints: [
    "ヒント1：世界的に有名なゲームキャラクターです",
    "ヒント2：職業は配管工です",
    "ヒント3：赤い帽子をかぶっています"
  ],
  choices: ["ドンキーコング", "マリオ", "カービィ"],
  answer: "マリオ",
  image: "img/IMG_box.jpeg",
  correctImage: "img/mario.jpeg"
},
{
  hints: [
    "ヒント1：動物です",
    "ヒント2：竹を主食にしています",
    "ヒント3：白と黒の体をしています"
  ],
  choices: ["パンダ", "シマウマ", "ホッキョクグマ"],
  answer: "パンダ",
  image: "img/IMG_box.jpeg",
  correctImage: "img/panda.jpg"
},
{
  hints: [
    "ヒント1：世界的に有名な建物です",
    "ヒント2：鉄でできています",
    "ヒント3：フランスにあります"
  ],
  choices: ["エッフェル塔", "自由の女神", "ピラミッド"],
  answer: "エッフェル塔",
  image: "img/IMG_box.jpeg",
  correctImage: "img/eiffel.jpg"
}

  ];


  let currentQuestionIndex = 0;//問題番号を管理
  let currentHintIndex = 0;//ヒントをいくつ出したか
  let usedHints = 0;//ヒントを使った数を記録
  let score = 0;//スコアを記録

  const hintContainer = document.getElementById("hints");
  const choiceContainer = document.getElementById("choices");
  const result = document.getElementById("result");
  const nextHintBtn = document.getElementById("nextHint");
  const nextQuestionBtn = document.getElementById("nextQuestion");
//以下関数
//スコアの更新
  function updateScore() {
    document.getElementById("score").innerHTML = "ポイント：" + score;
  }
//問題などの初期設定
  function loadQuestion() {
    const q = questions[currentQuestionIndex];

    hintContainer.innerHTML = "";
    choiceContainer.innerHTML = "";
    result.innerHTML = "";
    nextQuestionBtn.style.display = "none";

    currentHintIndex = 0;
    usedHints = 0;
//imageがあれば表示　　ifいらないのでは
    if (q.image) {
      const img = document.createElement("img");
      img.src = q.image;
      img.style.width = "250px";
      img.style.marginBottom = "20px";
      hintContainer.appendChild(img);
    }
//一つめのヒントを表示
    showHint();
//選択肢を個数分表示
    q.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerHTML = choice;
      btn.onclick = () => checkAnswer(choice);
      choiceContainer.appendChild(btn);
    });
  }
//ヒントボタンを押された時の処理
  function showHint() {
    const q = questions[currentQuestionIndex];

    if (currentHintIndex + 1 < q.hints.length) {
      const p = document.createElement("p");
      p.className = "hint";
      p.innerHTML = q.hints[currentHintIndex];
      hintContainer.appendChild(p);

      currentHintIndex++;
      usedHints++;
    } else {
		const p = document.createElement("p");
      p.className = "hint";
      p.innerHTML = q.hints[currentHintIndex];
      hintContainer.appendChild(p);
      usedHints++;
      nextHintBtn.disabled = true;
      nextHintBtn.innerHTML="ヒント終了";
    }
  }
//答え合わせ
  function checkAnswer(choice) {
    const q = questions[currentQuestionIndex];
    // ★ ここで全選択肢を無効化
  document.querySelectorAll(".choice").forEach(btn => {
    btn.disabled = true;
  });
    if (choice === q.answer) {
      result.innerHTML = "🎉 正解 🎉<br>";
      let gained = 10 - (usedHints - 1) * 2;
      score += gained;
		const img = document.createElement("img");
      img.src = q.correctImage;
      img.style.width = "250px";
      img.style.marginTop = "20px";
      result.appendChild(img);

    } else {
      result.innerHTML = "❌不正解正解は" + q.answer + "でした";
    }

    updateScore();

    nextQuestionBtn.style.display = "inline-block";
    nextHintBtn.disabled = true;
  }
//次の問題へ
  nextQuestionBtn.onclick = () => {
    currentQuestionIndex++;

    if (currentQuestionIndex < questions.length) {
      nextHintBtn.disabled = false;
      nextHintBtn.innerHTML="次のヒント";
      loadQuestion();

    } else {
      hintContainer.innerHTML = "";
      choiceContainer.innerHTML = "";
      const maxScore = questions.length * 10;
		result.innerHTML =
			"〜おわり〜<br>あなたの最終スコアは <strong>" + score + "/" + maxScore + " 点</strong> です！";


      nextQuestionBtn.style.display = "none";
      nextHintBtn.style.display = "none";
    }
  };

  nextHintBtn.onclick = showHint;

  loadQuestion();
</script>

</body>
</html>
